# TradeAnalytics — Infrastructure Configuration (dev)
# Environment-specific: endpoints, buckets, cluster
# Data sources → config/sources.yml
# Stream configs → config/streams/*.yml
# Risk → config/risk.yml

environment: dev

aws:
  region: us-east-1
  account_id: "311925399625"
  s3:
    raw: handh-trade-raw-use1
    refined: handh-trade-refined-use1
    mlflow: handh-trade-mlflow-use1
    dbx_root: handh-trade-dbx-root-use1

databricks:
  workspace: https://dbc-bf0075e6-07aa.cloud.databricks.com
  catalog: tradeanalytics
  schemas:
    bronze: bronze
    silver: silver
    gold: gold
    feature_store: feature_store

mlflow:
  experiment_base: /tradeanalytics/dev
  tracking_uri: databricks

cluster:
  instance_type: m5.xlarge
  spot: true
  auto_terminate_minutes: 20
  min_workers: 1
  max_workers: 4
