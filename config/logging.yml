logging:
  level: INFO                       # DEBUG | INFO | WARNING | ERROR
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"

  handlers:
    console:
      enabled: true
      level: INFO

    file:
      enabled: true
      level: DEBUG
      path: logs/tradeanalytics.log
      max_bytes: 10485760           # 10MB
      backup_count: 5

  # Separate audit log for all trade signals and decisions
  audit:
    enabled: true
    path: logs/audit.log
    level: INFO
