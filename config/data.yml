# TradeAnalytics — Data Configuration
# Data sources, intervals, ingestion modes, market calendar
# Same across environments — change here affects all envs
# To override per-environment, values in dev.yml/prod.yml take precedence

data:
  source: ibkr
  fallback_source: yahoo
  timezone: "America/New_York"
  market_open: "09:30"
  market_close: "16:00"

  # ── Interval configuration ─────────────────────────────────────────────────
  # Each interval tier has its own retention, lookback, and amendment buffer
  intervals:
    daily:
      enabled: true
      values: ["1d"]
      lookback_years: 10
      retention_years: 10
      amendment_buffer_days: 3      # re-fetch last N days for corrections

    intraday:
      enabled: false                # Phase 3
      values: ["1h", "4h"]
      lookback_years: 2
      retention_years: 2
      amendment_buffer_days: 1

    tick:
      enabled: false                # Phase 5
      values: ["1m", "5m"]
      lookback_days: 90
      retention_days: 90
      amendment_buffer_days: 0

  # ── Ingestion mode configuration ───────────────────────────────────────────
  # Controls what date range is fetched per symbol per run
  # All modes support symbols: [] scoping:
  #   symbols: []              → applies to ALL active symbols
  #   symbols: ["AAPL","MSFT"] → applies ONLY to listed symbols
  ingestion:

    incremental:
      max_gap_days: 30              # gaps > 30 days treated as backfill
      batch_size_days: 30           # chunk size when fetching large ranges

    # Extend history backwards beyond current earliest_date
    # Example: have 2016→today, set extend_history_start=2010-01-01
    # to fetch 2010→2015 for specific or all symbols
    history_extension:
      enabled: false
      extend_history_start: null    # e.g. "2010-01-01"
      symbols: []                   # [] = all, or ["AAPL","MSFT"] for specific

    # Fetch a specific date range regardless of watermark
    # Use for: filling known gaps, auditing specific periods
    date_range_override:
      enabled: false
      start_date: null              # e.g. "2019-06-01"
      end_date: null                # e.g. "2019-06-30"
      symbols: []

    # Re-fetch a date range and create amendment records for changed data
    # Use for: provider corrections, split/dividend restatements
    restatement:
      enabled: false
      start_date: null
      end_date: null
      symbols: []

    # Force full reload from scratch — ignores all watermarks
    # Requires BOTH enabled=true AND confirm=true (safety guard)
    force_reload:
      enabled: false
      symbols: []
      confirm: false                # must explicitly set true to execute

    # Provider fallback behaviour when primary provider fails
    provider_fallback:
      enabled: true
      max_retries: 3
      retry_delay_seconds: 30
      fallback_on_empty: true       # fall back if provider returns empty data
