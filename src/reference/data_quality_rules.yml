quality_rules:
  ohlcv:
    - rule: high_gte_low
      description: High must be >= Low
      severity: critical
      action: reject_record

    - rule: high_gte_open
      description: High must be >= Open
      severity: critical
      action: reject_record

    - rule: high_gte_close
      description: High must be >= Close
      severity: critical
      action: reject_record

    - rule: low_lte_open
      description: Low must be <= Open
      severity: critical
      action: reject_record

    - rule: low_lte_close
      description: Low must be <= Close
      severity: critical
      action: reject_record

    - rule: volume_positive
      description: Volume must be > 0
      severity: warning
      action: flag_record

    - rule: price_positive
      description: All prices must be > 0
      severity: critical
      action: reject_record

    - rule: no_weekend_dates
      description: No records on Saturday or Sunday
      severity: critical
      action: reject_record

    - rule: price_change_pct_threshold
      description: Single-day price change > 50% flagged for review
      severity: warning
      action: flag_record
      threshold: 50.0

    - rule: no_null_ohlcv
      description: No null values in OHLCV fields
      severity: critical
      action: reject_record

    - rule: max_consecutive_missing_days
      description: Alert if more than 5 consecutive trading days missing
      severity: warning
      action: alert
      threshold: 5

    - rule: vwap_between_low_and_high
      description: VWAP must be between session low and high
      severity: critical
      action: reject_record

    - rule: prev_close_positive
      description: Previous close must be positive
      severity: critical
      action: reject_record

    - rule: trade_count_positive
      description: Trade count should be positive on active trading days
      severity: warning
      action: flag_record

    - rule: gap_threshold
      description: Gap > 15% between prev_close and open flagged for review
      severity: warning
      action: flag_record
      threshold: 15.0

    - rule: amended_record_detected
      description: Record is an amendment of a previously stored record
      severity: warning
      action: flag_record

    - rule: fetch_duration_threshold
      description: API fetch took > 30 seconds — possible data quality issue
      severity: warning
      action: flag_record
      threshold: 30000

    - rule: pre_market_volume_non_negative
      description: Pre-market volume cannot be negative
      severity: critical
      action: reject_record
